    <script>
      let TIME = 0.0;
      let canvas;
      let scaleX = 40, scaleY = 40;
      let mx = 0.0, my = 0.0;
      let pmx = 0.0,pmy = 0.0;

      let colorBackground = "#0E1012"; //#1A3146
      let colorHUD = "#E5DCDC";
      let dpi = 3.0;

      let clock = {
        t: 512.0, //milliseconds
        tcurrent: 0.0,
        tend: 0.0,
        init: function () {
          this.tend = millis() + this.t;
        },
        compute: function () {
          this.tcurrent = millis();
          let dt = this.tend - this.tcurrent;

          return dt <= 0.0;
        },
      };

      let particles = [];

      function setup() {
        //canvas = createCanvas(720, 720);

        canvas = createCanvas(windowWidth, windowHeight);
        frameRate(60);
        smooth(8.0);
        pixelDensity(dpi);
        
        textSize(12.0);
        textAlign(CENTER);
        rectMode(CENTER);
        prefConfig();
        initConfig();

        return;
      }

      function windowResized() {
        canvas = resizeCanvas(windowWidth, windowHeight);
      }

      function draw() {
        let t = TIME;

        push();
        updateConfig();

        if (clock.compute()) {
          clock.init();
        }

        // --- Cycle check ---
        if (t - lastCycleTime >= cycleInterval || currentFormulaIndex < 0) {
          resetCycle();
        }

        // --- Get current formula ---
        let formulas = getFlowFormulas(t);
        let current = formulas[currentFormulaIndex];

        //let current = formulas[9];

        dflowfieldpath(current.s, current.f, current.g, particles);

        pop();

        return;
      }

      //events

      let cycleInterval = 9.0; // seconds
      let lastCycleTime = 0.0;
      let currentFormulaIndex = -1;

      // Pool of flow field generators: each returns { f, g, s }
      // f(x,y) = direction field, g(x,y) = magnitude field, s = scale
      function getFlowFormulas1(t) {
        return [
          {
            // 0
            f: (x, y) =>
              0.5 * (sin(0.1 * y - 0.1 * x) * x + y) +
              PI * noise(x, y) -
              0.75 * sin(x + y) * cos(0.25 * t - x),
            g: (x, y) => 0.85,
            s: 3.85,
          },

          {
            // 1
            f: (x, y) => 2 * PI * tanh(0.25 * sin(x + y)) * noise(x, y * 0.5),
            g: (x, y) => 0.85,
            s: 3.85,
          },

          {
            // 3
            f: (x, y) => 4.5 * tanh(x - y + noise(x) * noise(y)) * noise(x, y),
            g: (x, y) => 0.9,
            s: 3.5,
          },

          {
            // 7
            f: (x, y) => 0.1 * x * y * sin(x + y),
            g: (x, y) => 1.0,
            s: 3.5,
          },
        ];
      }

      function getFlowFormulas(t) {
        return [
          // 0. Spiral vortex — atan2 creates coherent spirals, noise breaks symmetry
          {
            f: (x, y) =>
              atan2(y, x) +
              0.5 * sin(sqrt(x * x + y * y) * 2.0) +
              PI * noise(x * 0.5, y * 0.5),
            g: (x, y) => 0.7 + 0.3 * noise(x, y),
            s: 3.85,
          },

          // 2. Turbulent cascade — layered noise at 3 octaves, produces organic turbulence
          {
            f: (x, y) =>
              TAU *
              (0.5 * noise(x * 0.3, y * 0.3) +
                0.3 * noise(x * 0.7, y * 0.7) +
                0.2 * noise(x * 1.5, y * 1.5)),
            g: (x, y) => 0.6 + 0.4 * noise(x * 2.0, y * 2.0),
            s: 4.2,
          },

          // 3. Magnetic dipole — field lines of a dipole at origin, noise perturbation prevents collapse
          {
            f: (x, y) => {
              let r2 = x * x + y * y + 0.01;
              let bx = (3.0 * x * y) / (r2 * r2);
              let by = (2.0 * y * y - x * x) / (r2 * r2);
              return atan2(by, bx) + 1.2 * noise(x, y);
            },
            g: (x, y) => 0.75,
            s: 3.5,
          },

          // 5. Kelvin-Helmholtz shear — horizontal shear layer with sinusoidal perturbation
          {
            f: (x, y) => {
              let shear = 2.0 * tanh(3.0 * y);
              let perturbation = 0.8 * sin(1.5 * x + 0.3 * t) * exp(-y * y);
              return shear + perturbation + PI * noise(x * 0.5, y * 0.5);
            },
            g: (x, y) => 0.7 + 0.2 * exp(-y * y),
            s: 4.0,
          },

          // 7. Von Kármán vortex street — alternating vortices along x-axis
          {
            f: (x, y) => {
              let v1 = atan2(y - 0.8, sin(1.2 * x)) * 0.8;
              let v2 = -atan2(y + 0.8, sin(1.2 * x + PI)) * 0.8;
              return (
                v1 +
                v2 +
                TAU * noise(x * 0.3, y * 0.3) +
                0.2 * sin(0.15 * t - x)
              );
            },
            g: (x, y) => 0.8,
            s: 4.0,
          },

          // 11. Strange attractor echo — Lorenz-like cross-coupling terms
          {
            f: (x, y) => {
              let sigma = 1.2;
              let dx = sigma * (y - x);
              let dy = x * (2.8 - abs(y)) - y;
              return atan2(dy, dx) + 0.6 * noise(x * 0.5, y * 0.5);
            },
            g: (x, y) => 0.65 + 0.25 * tanh(x * x + y * y - 4.0),
            s: 3.85,
          },

          // 12. Tropical storm — radial inflow + tangential rotation + noise turbulence
          {
            f: (x, y) => {
              let r = sqrt(x * x + y * y) + 0.1;
              let theta = atan2(y, x);
              let inflow = -0.3 / r;
              let tangential = 2.0 / (1.0 + r);
              return (
                theta + tangential + inflow * sin(theta) + 1.5 * noise(x, y)
              );
            },
            g: (x, y) => 0.5 + 0.5 / (1.0 + sqrt(x * x + y * y)),
            s: 3.85,
          },

          // 13. Elastic membrane — standing wave modes create vibration node patterns
          {
            f: (x, y) => {
              let m1 = sin(1.0 * x) * sin(2.0 * y);
              let m2 = sin(2.0 * x) * sin(1.0 * y);
              let m3 = sin(3.0 * x) * sin(1.0 * y) * 0.5;
              return PI * (m1 + m2 * cos(0.15 * t) + m3) + noise(x, y);
            },
            g: (x, y) => 0.8,
            s: 3.85,
          },

          // 14. Conformal map — Joukowski-inspired transform, creates airfoil-like streamlines
          {
            f: (x, y) => {
              let r2 = x * x + y * y + 0.5;
              let u = 1.0 - (x * x - y * y) / (r2 * r2);
              let v = (-2.0 * x * y) / (r2 * r2);
              return (
                atan2(v, u) + 0.8 * noise(x * 0.4, y * 0.4) + 0.3 * sin(0.1 * t)
              );
            },
            g: (x, y) => 0.75,
            s: 4.0,
          },

          // 15. Rayleigh-Bénard convection rolls — periodic cells with thermal-like circulation
          {
            f: (x, y) => {
              let fx = -cos(1.5 * x) * sin(1.5 * y);
              let fy = sin(1.5 * x) * cos(1.5 * y);
              return (
                atan2(fy, fx) + 0.4 * sin(3.0 * x * y) + noise(x * 0.6, y * 0.6)
              );
            },
            g: (x, y) => 0.7 + 0.2 * abs(sin(1.5 * x) * sin(1.5 * y)),
            s: 4.2,
          },

          // 16. Topographic contour — gradient of a complex height field, particles trace ridges
          {
            f: (x, y) => {
              let eps = 0.02;
              let h = (px, py) =>
                sin(px) * cos(py * 0.7) +
                0.5 * sin(2.3 * px + 1.1 * py) +
                2.0 * noise(px * 0.3, py * 0.3);
              let dx = (h(x + eps, y) - h(x - eps, y)) / (2.0 * eps);
              let dy = (h(x, y + eps) - h(x, y - eps)) / (2.0 * eps);
              // Rotate gradient 90° to follow contours
              return atan2(-dx, dy) + 0.15 * sin(0.2 * t);
            },
            g: (x, y) => 0.8,
            s: 4.0,
          },

          // 19. Phase portrait — Duffing oscillator, twin-well potential creates butterfly topology
          {
            f: (x, y) => {
              let fx = y;
              let fy = x - x * x * x - 0.15 * y + 0.3 * cos(0.2 * t);
              return atan2(fy, fx) + 0.3 * noise(x * 0.5, y * 0.5);
            },
            g: (x, y) => 0.6 + 0.3 * tanh(abs(y)),
            s: 3.5,
          },

          {
            // 0
            f: (x, y) =>
              0.5 * (sin(0.1 * y - 0.1 * x) * x + y) +
              PI * noise(x, y) -
              0.75 * sin(x + y) * cos(0.25 * t - x),
            g: (x, y) => 0.85,
            s: 3.85,
          },

          {
            // 1
            f: (x, y) => 2 * PI * tanh(0.25 * sin(x + y)) * noise(x, y * 0.5),
            g: (x, y) => 0.85,
            s: 3.85,
          },

          {
            // 3
            f: (x, y) => 4.5 * tanh(x - y + noise(x) * noise(y)) * noise(x, y),
            g: (x, y) => 0.9,
            s: 3.5,
          },

          {
            // 7
            f: (x, y) => 0.1 * x * y * sin(x + y),
            g: (x, y) => 1.0,
            s: 3.5,
          },
        ];
      }

      function pickNewFormula() {
        let formulas = getFlowFormulas(0);
        let next;
        do {
          next = floor(random(formulas.length));
        } while (next === currentFormulaIndex && formulas.length > 1);
        currentFormulaIndex = next;
      }

      function resetCycle() {
        background(colorBackground);
        pickNewFormula();

        // Reset particle positions
        for (let i = 0; i < particles.length; i++) {
          particles[i].pos = [random(-4, 4), random(-4, 4)];
        }

        lastCycleTime = millis() / 1000.0;
      }

      function render() {}

      //config functions

      function prefConfig() {
        translate(width / 2.0, height / 2.0);
        applyMatrix(scaleX, 0.0, 0.0, -scaleY, 0.0, 0.0);

        return;
      }

      let bparticles = [];

      function initConfig() {
        background(colorBackground);
        clock.init();

        particles = [];
        let n = 8000;

        for (let i = 0; i < n; i++) {
          let pt = new Particle(
            [random(-4, 4), random(-4, 4)],
            0.01,
            "#ffffff",
          );
          particles.push(pt);
          bparticles.push(pt);
        }

        // First formula pick
        pickNewFormula();
        lastCycleTime = millis() / 1000.0;

        return;
      }

      function updateConfig() {
        mx = map(mouseX, 0, width, -width / (2 * scaleX), width / (2 * scaleX));
        my = -map(
          mouseY,
          0,
          height,
          -height / (2 * scaleY),
          height / (2 * scaleY),
        );
        pmx = map(pmouseX, 0, width, -width / 200.0, width / 200.0);
        pmy = -map(pmouseY, 0, height, -height / 200.0, height / 200.0);

        prefConfig();
        TIME = millis() / 1000.0;

        return;
      }

      function dflowfieldpath(s, fdir, fmag, part) {
        for (let i = 0; i < part.length; i++) {
          let pt = part[i];
          let vec = vmult(s, pt.pos);
          let ipos = vmult(1.0, vec);

          //print(p);

          let a = fdir(vec[0], vec[1]);
          let m = fmag(vec[0], vec[1]);

          vec[0] = m * cos(a);
          vec[1] = m * sin(a);

          //pt.accelerate(vec);
          pt.velocity(vec);
          pt.compute();
          //pt.accelerate([0,0]);

          let fpos = vmult(s, pt.pos);

          let t = TIME;
          let c0 = color("#CEF444"); //'#CEF444'
          let c1 = color("#ED387A"); //'#5768E8'  '#67E857'
          let c = lerpColor(c1, c0, twa(0.1 * t));
          let theta = arctheta(0, 0, vec[0], vec[1]);
          let it = map(theta, 0, TAU, 0, 1);

          //twilightshifted

          c = twilightshifted(twa(0.1 * t)); //map(i, 0,part.length, 0,1)  twa(0.5*t)
          c = vmult(255.0, c);

          //c = pt.cfill;

          stroke(c); //_pt.cfill
          strokeWeight(0.025);
          dline(ipos, fpos);
        }

        return;
      }

      function getmatrixcolorimage(img) {
        let mc = [];
        let m = [];

        for (let ir = img.height - 1; ir > 0; ir--) {
          for (let ic = 0; ic < img.width - 1; ic++) {
            let col = color(img.get(ic, ir));
            m.push(col);
          }

          mc.push(m);
          m = [];
        }

        return mc;
      }

      function creatematrixcolor(row, col, f) {
        let m = [];
        let nc = [];

        for (let r = 0; r < row; r++) {
          for (let c = 0; c < col; c++) {
            let x = map(1 * c, 0, col, 0, 1);
            let y = map(1 * r, 0, row, 0, 1);
            let uv = [x, y];

            nc.push(f(uv));
          }
          m.push(nc);
          nc = [];
        }

        return m;
      }

      function gridcolor(x, y, _w, _h, mc, format) {
        let w = _w;
        let h = _h;
        let W = _w * mc[0].length;
        let H = _h * mc.length;

        rectMode(CORNER);

        let ix = 0.0;
        let iy = 0.0;

        for (let ir = 0; ir < mc.length; ir++) {
          for (let ic = 0; ic < mc[0].length; ic++) {
            let c = mc[ir][ic];

            fill(c);
            noStroke();
            //rect(ix+x, iy+y, w, h);

            switch (format) {
              case "rect":
                rect(ix + x - W / 2.0, iy + y - H / 2.0, w, h);

                break;

              case "dot":
                ellipse(ix + x - W / 2.0, iy + y - H / 2.0, w, h);

                break;

              default:
                rect(ix + x - W / 2.0, iy + y - H / 2.0, w, h);
            }

            ix += w;
          }

          ix = 0;
          iy += h;
        }

        return;
      }

      class Particle {
        constructor(p, radius, hexcolor) {
          this.s = 1.0;
          this.pos = p;
          this.vel = [0, 0];
          this.acc = [0, 0];
          this.dir = [0, 0];
          this.dt = 0.016;
          this.speed = 1.125;
          this.damping = 0.32;
          this.fdp = function (x) {
            return 0.95 * log(x + 1);
          };

          this.path = [];
          this.pathlimit = 7;

          this.radius = radius;
          this.cfill = hexcolor;
          this.cstroke = "#ffffff";
          this.cstrokeweight = 0.01;
        }

        accelerate(a) {
          this.acc = a;
          //this.vel = vadd(this.vel, vmult(this.dt,this.acc));

          return;
        }

        velocity(v) {
          this.vel = v;
          //this.pos = vadd(this.pos, vmult(this.dt,this.vel));

          return;
        }

        compute() {
          this.vel = vadd(this.vel, vmult(this.dt, this.acc));
          this.pos = vadd(this.pos, vmult(this.dt, this.vel));
          this.computepath();

          return;
        }

        computepath() {
          if (this.path.length >= this.pathlimit) {
            this.path = this.path.slice(1);
          } else {
            this.path.push(this.pos);
          }

          return;
        }

        drawparticle() {
          //this.compute();

          /*push();
      strokeWeight(0.025);
      stroke('#ffffff');
      fill('#ffffff');
      translate(this.pos[0],this.pos[1]);
      dvector([0,0],this.vel,0.05); 
    pop();
    
    push();
      strokeWeight(0.025);
      stroke('#ffffff');
      fill('#ffffff');
      translate(this.pos[0],this.pos[1]);
      dvector([0,0],vmult(this.dir,3.5),0.05); 
    pop();*/

          fill(this.cfill);
          noStroke();
          dcircle(vmult(this.s, this.pos), 2 * this.radius);

          return;
        }

        drawpath(s, cstroke, cstrokeweight, j, n) {
          this.setscale(s);

          for (let i = 0; i < this.path.length - 1; i++) {
            let x1 = this.s * this.path[i][0];
            let y1 = this.s * this.path[i][1];
            let x2 = this.s * this.path[i + 1][0];
            let y2 = this.s * this.path[i + 1][1];

            let c = twilightshifted(map(j, 0, n, 0, 1));

            let t = TIME;

            c = twilightshifted(twa(0.1 - j / n));
            c = vmult(255.0, c);
            //c = color(c);

            stroke(c); //cstroke
            strokeWeight(cstrokeweight);
            line(x1, y1, x2, y2);
          }

          return;
        }

        updatepath(s, fdir, fmag, part) {
          this.setscale(s);

          return;
        }

        setscale(s) {
          this.s = s;
        }
      }

      class Clock {

          this.compute = function () {
            this.tcurrent = millis();

            return dt <= 0.0;

      function dq2beziercolor(p0, p1, p2, t) {
        let x0 = p0[0];
        let y0 = p0[1];
        let z0 = p0[2];

        let x1 = p1[0];
        let y1 = p1[1];
        let z1 = p1[2];

        let x2 = p2[0];
        let y2 = p2[1];
        let z2 = p2[2];

        let q2b = (t) => [
          (1 - t) * (1 - t) * x0 + 2 * (1 - t) * t * x1 + t * t * x2,
          (1 - t) * (1 - t) * y0 + 2 * (1 - t) * t * y1 + t * t * y2,
          (1 - t) * (1 - t) * z0 + 2 * (1 - t) * t * z1 + t * t * z2,
        ];
        let q0 = [0.0, 0.0, 0.0];
        q0 = q2b(t);

        return q0;

      function vmax(a, b) {
        if (Array.isArray(a) && Array.isArray(b)) {
          // Si ambos son vectores, devuelve un vector donde cada componente es el máximo de los componentes correspondientes
          let result = [];
          for (let i = 0; i < a.length; i++) {
            result[i] = Math.max(a[i], b[i]);
          }
          return result;
        } else if (Array.isArray(a)) {
          // Si 'a' es un vector y 'b' es un escalar, devuelve un vector donde cada componente es el máximo entre el componente y el escalar
          let result = [];
          for (let i = 0; i < a.length; i++) {
            result[i] = Math.max(a[i], b);
          }
          return result;
        } else if (Array.isArray(b)) {
          // Si 'b' es un vector y 'a' es un escalar, devuelve un vector donde cada componente es el máximo entre el componente y el escalar
          let result = [];
          for (let i = 0; i < b.length; i++) {
            result[i] = Math.max(a, b[i]);
          }
          return result;
        } else {
          // Si ambos son escalares, simplemente devuelve el máximo de los dos
          return Math.max(a, b);
        }
      }

      function vmult(a, b) {
        if (typeof a === "number") {
          let v = [];
          for (let i = 0; i < b.length; i++) {
            v.push(a * b[i]);
          }
          return v;
        }
        if (typeof b === "number") {
          let v = [];
          for (let i = 0; i < a.length; i++) {
            v.push(b * a[i]);
          }
          return v;
        }
        if (typeof a === "number" && typeof b === "number") {
          return a * b;
        } else {
          let v = [];
          for (let i = 0; i < b.length && a.length == b.length; i++) {
            v.push(a[i] * b[i]);
          }
          return v;
        }

        return [];
      }

      function vdiv(a, b) {
        if (typeof a === "number") {
          let v = [];
          for (let i = 0; i < b.length; i++) {
            v.push((1.0 / a) * b[i]);
          }
          return v;
        }
        if (typeof b === "number") {
          let v = [];
          for (let i = 0; i < a.length; i++) {
            v.push((1.0 / b) * a[i]);
          }
          return v;
        }
        if (typeof a === "number" && typeof b === "number") {
          return a / b;
        } else {
          let v = [];
          for (let i = 0; i < b.length && a.length == b.length; i++) {
            v.push(a[i] / b[i]);
          }
          return v;
        }

        return [];
      }

      function vnormalize(v) {
        let n = 0.0;
        for (let i = 0; i < v.length; i++) {
          n += v[i] * v[i];
        }
        let l = sqrt(n);

        return vmult(1.0 / l, v);

      function vadd(a, b) {
        if (typeof a === "number") {
          let v = [];
          for (let i = 0; i < b.length; i++) {
            v.push(a + b[i]);
          }
          return v;
        }
        if (typeof b === "number") {
          let v = [];
          for (let i = 0; i < a.length; i++) {
            v.push(b + a[i]);

          return v;
        }
        if (typeof a === "number" && typeof b === "number") {

      function vsub(a, b) {
        if (typeof a === "number") {
          let v = [];
          for (let i = 0; i < b.length; i++) {
            v.push(b[i] - a);
          }
          return v;
        }
        if (typeof b === "number") {
          let v = [];
          for (let i = 0; i < a.length; i++) {
            v.push(a[i] - b);
          }
          return v;
        }
        if (typeof a === "number" && typeof b === "number") {
          return a - b;
        } else {
          let v = [];
          for (let i = 0; i < b.length && a.length == b.length; i++) {
            v.push(a[i] - b[i]);
          }
          return v;
        }

        return [];
      }

      function vdot(a, b) {
        if (a.length !== b.length) {
          throw new Error("Both vectors must be of the same length.");
        }
        let product = 0.0;
        for (let i = 0; i < a.length; i++) {
          product += a[i] * b[i];
        }
        return product;
      }

        let c = [
          a[1] * b[2] - a[2] * b[1],
          a[2] * b[0] - a[0] * b[2],
          a[0] * b[1] - a[1] * b[0],
        ];
        return c;

        }

                      vmult(t, vadd(c4, vmult(t, vadd(c5, vmult(t, c6))))),
                    ),
                  ),
                ),
              ),
            ),
          ),
        );
      }

      function rdtlbu_r(t) {
        t = 0.0 <= t && t <= 1.0 ? t : tsn(t, 0.0, 1.0);

        const c0 = [0.207621, 0.196195, 0.618832];
        const c1 = [-0.088125, 3.19617, -0.353302];
        const c2 = [8.261232, -8.366855, 14.368787];
        const c3 = [-2.922476, 33.244294, -43.419173];
        const c4 = [-34.085327, -74.476041, 37.159352];
        const c5 = [50.42979, 67.145621, -1.750169];
        const c6 = [-21.188828, -20.935464, -6.501427];

        //return c0+t*(c1+t*(c2+t*(c3+t*(c4+t*(c5+t*c6)))));

        return vadd(
          c0,
          vmult(
            t,
            vadd(
              c1,
              vmult(
                t,
                vadd(
                  c2,
                  vmult(
                    t,
                    vadd(
                      c3,
                      vmult(t, vadd(c4, vmult(t, vadd(c5, vmult(t, c6))))),
                    ),
                  ),
                ),
              ),
            ),
          ),
        );
      }

      function spectral_r(t) {
        t = 0.0 <= t && t <= 1.0 ? t : tsn(t, 0.0, 1.0);

        const c0 = [0.426208, 0.275203, 0.563277];
        const c1 = [-5.321958, 3.761848, 5.477444];
        const c2 = [42.422339, -15.057685, -57.232349];
        const c3 = [-100.917716, 57.029463, 232.590601];
        const c4 = [106.422535, -116.177338, -437.123306];
        const c5 = [-48.460514, 103.570154, 378.80792];
        const c6 = [6.016269, -33.393152, -122.850806];

        //return c0+t*(c1+t*(c2+t*(c3+t*(c4+t*(c5+t*c6)))));

        return vadd(
          c0,
          vmult(
            t,
            vadd(
              c1,
              vmult(
                t,
                vadd(
                  c2,
                  vmult(

                    vadd(
                      c3,

      function viridis(t) {
        t = 0.0 <= t && t <= 1.0 ? t : tsn(t, 0.0, 1.0);

        const c0 = [0.274344, 0.004462, 0.331359];
        const c1 = [0.108915, 1.397291, 1.38811];
        const c2 = [-0.319631, 0.24349, 0.156419];
        const c3 = [-4.629188, -5.882803, -19.646115];
        const c4 = [6.181719, 14.388598, 57.442181];
        const c5 = [4.876952, -13.955112, -66.125783];
        const c6 = [-5.513165, 4.709245, 26.58218];
        //return c0+t*(c1+t*(c2+t*(c3+t*(c4+t*(c5+t*c6)))));

        return vadd(
          c0,
          vmult(
            t,
            vadd(
              c1,
              vmult(
                t,
                vadd(
                  c2,
                  vmult(
                    t,
                    vadd(
                      c3,
                      vmult(t, vadd(c4, vmult(t, vadd(c5, vmult(t, c6))))),

                  ),
                ),
              ),
            ),
          ),
        );
      }

      function step(edge, x) {
        return x < edge ? 0.0 : 1.0;
      }

      function clamp(x, minVal, maxVal) {
        return Math.min(Math.max(x, minVal), maxVal);
      }

      function smoothstep(edge0, edge1, x) {
        let t = clamp((x - edge0) / (edge1 - edge0), 0.0, 1.0);
        return t * t * (3.0 - 2.0 * t);
      }

      function lerpnum(a, b, t) {
        return (1 - t) * a + t * b;
      }

      function lerpvec3(p0, p1, t) {
        let x0 = p0[0];
        let y0 = p0[1];
        let z0 = p0[2];
        let x1 = p1[0];
        let y1 = p1[1];
        let z1 = p1[2];

        return [
          (1 - t) * x0 + t * x1,
          (1 - t) * y0 + t * y1,
          (1 - t) * z0 + t * z1,
        ];
        //return [lerpnum(p0[0],p1[0],t),lerpnum(p0[1],p1[1],t),lerpnum(p0[2],p1[2],t)];
      }

      function lerpvec2(p0, p1, t) {
        let x0 = p0[0];
        let y0 = p0[1];
        let x1 = p1[0];
        let y1 = p1[1];

        return [(1 - t) * x0 + t * x1, (1 - t) * y0 + t * y1];
        //return [lerpnum(p0[0],p1[0],t),lerpnum(p0[1],p1[1],t),lerpnum(p0[2],p1[2],t)];
      }

      function arctheta(x1, y1, x2, y2) {
        let dx = x2 - x1;
        let dy = y2 - y1;

        if (dx == 0) {
          return (sgn(dy) * PI) / 2.0;
        }

        if (0 < dx && 0 < dy) {
          return acos(dx / sqrt(dx * dx + dy * dy));
        }
        if (dx <= 0 && 0 < dy) {
          return acos(dx / sqrt(dx * dx + dy * dy));
        }
        if (dx < 0 && dy <= 0) {
          return PI + atan(dy / dx);
        }
        if (0 <= dx && dy < 0) {
          return 2 * PI + atan(dy / dx);
        }
        return 0;
      }

      function arcphi(x0, y0, z0, x1, y1, z1) {
        h0 = Math.sqrt(
          (x1 - x0) * (x1 - x0) + (y1 - y0) * (y1 - y0) + (z1 - z0) * (z1 - z0),
        );
        h1 = Math.sqrt((x1 - x0) * (x1 - x0) + (y1 - y0) * (y1 - y0));
        dz = z1 - z0;
        return h1 > 0
          ? dz >= 0
            ? Math.acos(h1 / h0)
            : -Math.acos(h1 / h0)
          : (sgn(dz) * Math.PI) / 2.0;
      }

      function mod(a, b) {
        return a % b;
      }

      function sgn(x) {
        return x < 0.0 ? -1.0 : 1.0;
      }

      function sinh(x) {
        return (exp(x) - exp(-x)) / 2.0;
      }

      function cosh(x) {
        return (exp(x) + exp(-x)) / 2.0;
      }

      function coth(x) {
        return cosh(x) / sinh(x);
      }

      function sech(x) {
        return 1 / cosh(x);
      }

      function csch(x) {
        return 1 / sinh(x);
      }

      function tanh(x) {
        return (exp(x) - exp(-x)) / (exp(x) + exp(-x));
      }

      function sgn(x) {
        return x < 0 ? -1 : x > 0 ? 1 : 0;
      }

      function tsn(x, min, max) {
        //Vec3DeepLoop365!
        var a = abs(min) + abs(max);
        var p = 2.0 * a;
        var y = min;

        //r*sin(x/p)
        //r*(2.0*abs( 2*( x/p - floor(x/p  + 0.75) + 0.25 )) - 1.0) ;

        return a * abs(2 * (x / p - floor(x / p + 0.5))) + y;
      }

      function twa(x) {
        return tsn(x, 0.0, 1.0);
      }
