  <script>

    let TIME = 0.0;
    let canvas;
    let scaleX = 100, scaleY = 100;

    let colorBackground = '#0E1012'; //#1A3146
    let colorHUD = "#E5DCDC";
    let dpi = 3.0;


    let wcamera = [0.0, 0.0];
    let wrotate = 0.0;
    let wzoom = 1.0;

    let cam = {
      target: [0, 0, 0],
      distance: 10.0,
      theta: 0.0,
      phi: 3.14159265 / 6.0,
      fov: 50.0       // degrees
    };

    function preload() {

      //nothing

      return;
    }

    function setup() {

      //canvas = createCanvas(1080,620);
      canvas = resizeCanvas(windowWidth, windowHeight);

      frameRate(60);
      smooth(8.0);
      pixelDensity(dpi);

      textSize(1.0);
      //textAlign(CENTER);
      //rectMode (CENTER);
      prefconfig();
      initconfig();

      return;
    }

    function windowResized() {
      canvas = resizeCanvas(windowWidth, windowHeight);
    }

    function draw() {
      push();


      let t = TIME;

      background(colorBackground);
      updateconfig();


      //dgrid(0,0, 1*250,1*250, 1*32,1*32, '#222223', 0.0025);
      //dgrid(0,0, 1*50,1*50, 1*32,1*32, '#3F4042', 0.0025);
      //dgaxis(32.0,32.0);

      spherecam(0, 0, 0, 11, 3 * PI / 2 + 0.45 * cos(1.25 * t), 0.45 * sin(1.25 * t) + 0.2);

      cam.fov = 30 + 0 * cos(t);


      let w = TAU + 0.3;
      let h = TAU + 0.3;
      let step = 0.2;

      let tx = 0.0;
      let ty = 0.0;
      let tz = 0.0;

      let rx = 0;
      let ry = 0;
      let rz = 0;

      //torus
      let rfx = (u, v, a) => (3 + 1 * cos(v)) * cos(u);
      let rfy = (u, v, a) => (3 + 1 * cos(v)) * sin(u);
      let rfz = (u, v, a) => 1 * sin(v);

      let fx = (u, v, a) => rotation3d(rfx(u, v, a), rfy(u, v, a), rfz(u, v, a), 1.1 * t, 0, 1.5 * t)[0];
      let fy = (u, v, a) => rotation3d(rfx(u, v, a), rfy(u, v, a), rfz(u, v, a), 1.1 * t, 0, 1.5 * t)[1];
      let fz = (u, v, a) => rotation3d(rfx(u, v, a), rfy(u, v, a), rfz(u, v, a), 1.1 * t, 0, 1.5 * t)[2];

      //sphere
      let rgx = (u, v, a) => 4 * cos(v) * cos(u);
      let rgy = (u, v, a) => 4 * cos(v) * sin(u);
      let rgz = (u, v, a) => 4 * sin(v);

      let gx = (u, v, a) => rotation3d(rgx(u, v, a), rgy(u, v, a), rgz(u, v, a), 1.1 * t, 0, 1.5 * t)[0];
      let gy = (u, v, a) => rotation3d(rgx(u, v, a), rgy(u, v, a), rgz(u, v, a), 1.1 * t, 0, 1.5 * t)[1];
      let gz = (u, v, a) => rotation3d(rgx(u, v, a), rgy(u, v, a), rgz(u, v, a), 1.1 * t, 0, 1.5 * t)[2];


      //plane
      let wx = (u, v, a) => u * 0 + u * cos(-a * 0.5) - v * sin(-a * 0.5);
      let wy = (u, v, a) => v * 0 + u * sin(-a * 0.5) + v * cos(-a * 0.5);
      let wz = (u, v, a) => 0;

      //some function xy
      let nx = (u, v, a) => u * 0 + u * cos(-a * 1.25) - v * sin(-a * 1.25);
      let ny = (u, v, a) => v * 0 + u * sin(-a * 1.25) + v * cos(-a * 1.25);
      let nz = (u, v, a) => 1.5 * cos(0.8 * u + 3 * a) * sin(0.8 * v + 3 * a);

      //cube

      let gmax = (x, y, z) => max(abs(x), max(abs(y), abs(z)));

      let mx = (u, v, a) => (3 * cos(v) * cos(u)) / gmax(1 * cos(v) * cos(u), 1 * cos(v) * sin(u), 1 * sin(v));
      let my = (u, v, a) => (3 * cos(v) * sin(u)) / gmax(1 * cos(v) * cos(u), 1 * cos(v) * sin(u), 1 * sin(v));
      let mz = (u, v, a) => (3 * sin(v)) / gmax(1 * cos(v) * cos(u), 1 * cos(v) * sin(u), 1 * sin(v));

      let fxx = (x, y, a) => xperspective(fx(x, y, a), fy(x, y, a), fz(x, y, a), tx, ty, tz, rx, ry, rz);
      let fyy = (x, y, a) => yperspective(fx(x, y, a), fy(x, y, a), fz(x, y, a), tx, ty, tz, rx, ry, rz);

      let gxx = (x, y, a) => xperspective(gx(x, y, a), gy(x, y, a), gz(x, y, a), tx, ty, tz, rx, ry, rz);
      let gyy = (x, y, a) => yperspective(gx(x, y, a), gy(x, y, a), gz(x, y, a), tx, ty, tz, rx, ry, rz);

      let wxx = (x, y, a) => xperspective(wx(x, y, a), wy(x, y, a), wz(x, y, a), tx, ty, tz, rx, ry, rz);
      let wyy = (x, y, a) => yperspective(wx(x, y, a), wy(x, y, a), wz(x, y, a), tx, ty, tz, rx, ry, rz);

      let nxx = (x, y, a) => xperspective(nx(x, y, a), ny(x, y, a), nz(x, y, a), tx, ty, tz, rx, ry, rz);
      let nyy = (x, y, a) => yperspective(nx(x, y, a), ny(x, y, a), nz(x, y, a), tx, ty, tz, rx, ry, rz);

      let mxx = (x, y, a) => xperspective(mx(x, y, a), my(x, y, a), mz(x, y, a), tx, ty, tz, rx, ry, rz);
      let myy = (x, y, a) => yperspective(mx(x, y, a), my(x, y, a), mz(x, y, a), tx, ty, tz, rx, ry, rz);


      let t0 = sgm(8 * sin(0.75 * t - 0.5 * PI));
      let t1 = sgm(6 * sin(0.85 * t - 0.25 * PI));

      let hx = (x, y, a) => lerpnum(lerpnum(nxx(x, y, a), gxx(x, y, a), t0), fxx(x, y, a), t1);
      let hy = (x, y, a) => lerpnum(lerpnum(nyy(x, y, a), gyy(x, y, a), t0), fyy(x, y, a), t1);


      let lx = (x, y, a) => cos(x + a) - sin(y);
      let ly = (x, y, a) => cos(x - a) - sin(y + a);

      //dgrid3d(0,0,0,0,0,0, 50,50, 10,10, '#4C4C4C', 0.0025);
      //dgrid3d(0,0,0,0,0,0, 10,10, 10,10, '#878787', 0.0025);


      dgrid3d(0, 0, 5, 0, 0, 0, 50, 50, 10, 10, '#4C4C4C', 0.0025);
      dgrid3d(0, 0, 5, 0, 0, 0, 10, 10, 10, 10, '#878787', 0.0025);

      dgrid3d(0, 0, -5, 0, 0, 0, 50, 50, 10, 10, '#4C4C4C', 0.0025);
      dgrid3d(0, 0, -5, 0, 0, 0, 10, 10, 10, 10, '#878787', 0.0025);

      dgrid3d(0, 0, -5, 0, PI / 2, 0, 50, 50, 10, 10, '#4C4C4C', 0.0025);
      dgrid3d(0, 0, -5, 0, PI / 2, 0, 10, 10, 10, 10, '#878787', 0.0025);

      //dgrid3d(0,0,5, 0,PI/2,0, 50,50, 10,10, '#4C4C4C', 0.0025);
      //dgrid3d(0,0,5, 0,PI/2,0, 10,10, 10,10, '#878787', 0.0025);

      dgrid3d(0, 0, 5, PI / 2, 0, 0, 50, 50, 10, 10, '#4C4C4C', 0.0025);
      dgrid3d(0, 0, 5, PI / 2, 0, 0, 10, 10, 10, 10, '#878787', 0.0025);

      dgrid3d(0, 0, -5, PI / 2, 0, 0, 50, 50, 10, 10, '#4C4C4C', 0.0025);
      dgrid3d(0, 0, -5, PI / 2, 0, 0, 10, 10, 10, 10, '#878787', 0.0025);



      stroke(255);
      strokeWeight(0.01);
      //dgridpoints(w,h,step,hx,hy,t);


      hx = (x, y, a)     => lerpnum(fx(x, y, a), nx(x, y, a), t0);
      hy = (x, y, a)     => lerpnum(fy(x, y, a), ny(x, y, a), t0);
      let hz = (x, y, a) => lerpnum(fz(x, y, a), nz(x, y, a), t0);


      //dgridplane3d(w,h,step,hx,hy,hz, t);

      dgridplane3dcolor(w, h, step, hx, hy, hz, t, (t) => vmult(viridis(t), 255), 1);

      /*fill(255,255,0);
      stroke(255,255,0);
      strokeWeight(0.015);
      dvector([0,0],[2*cos(t),2*sin(t)],0.1); */

      stroke(255, 80, 80);
      strokeWeight(0.015);
      fill(255, 80, 80);
      //dvec3d([0,0,0], [3*cos(t),3*sin(t),cos(t)], 0.15, 0.12);

      let l = 5;

      //z
      stroke(0, 0, 255);
      strokeWeight(0.015);
      dline3d(0, 0, -l, 0, 0, l);
      strokeWeight(0.03);
      dpoint3d(0, 0, l);

      //x
      stroke(255, 0, 0);
      strokeWeight(0.015);
      dline3d(-l, 0, 0, l, 0, 0);
      strokeWeight(0.03);
      dpoint3d(l, 0, 0);

      //y
      stroke(0, 255, 0);
      strokeWeight(0.015);
      dline3d(0, -l, 0, 0, l, 0);
      strokeWeight(0.03);
      dpoint3d(0, l, 0);


      stroke(255);
      strokeWeight(0.035);
      dpoint3d(0, 0, 0, 0, 0, 0);

      stroke(255);
      strokeWeight(0.01);

      let lg = 10;
      dcube(lg, lg, lg, 0, 0, 0, 0, 0, 0);

      wcamera = [0.0, 0.0];
      wrotate = 0;
      wzoom = 1.5 + 0.0 * cos(t * 2.5);

      pop();
      hud();
      return;
    }






    //config functions

    function prefconfig() {

      translate(width / 2.0, height / 2.0);
      applyMatrix(scaleX * (1.0 / wzoom), 0.0,
        0.0, -scaleY * (1.0 / wzoom),
        0.0, 0.0);
      rotate(wrotate);
      translate(-wcamera[0], -wcamera[1]);
      //scale(wzoom);

      return;
    }

    function initconfig() {


      return;
    }

    function updateconfig() {

      //background(colorBackground);

      prefconfig();
      TIME = millis() / 1000.0;

      return;
    }

    function hud() {

      textSize(16.0);
      fill(colorHUD);
      noStroke();
      text(nfc(frameRate(), 2) + " fps", width - 80, 20.0);
      text("time: " + nfc(millis() / 1000.0, 2.0) + "s", 10, 20.0);

      return;
    }




    //utils functions

    function dgridpoints(w, h, step, fx, fy, t) {

      for (let iy = -h / 2.0; iy < h / 2.0; iy += step) {
        for (let ix = -w / 2.0; ix < w / 2.0; ix += step) {
          point(fx(ix, iy, t), fy(ix, iy, t));
        }
      }

      return;
    }

    function dgridplane3d(w, h, step, fxt, fyt, fzt, t) {

      let x1 = 0, y1 = 0, z1 = 0;

      let x2 = 0, y2 = 0, z2 = 0;

      for (let iy = -h / 2.0; iy <= h / 2.0; iy += step) {
        for (let ix = -w / 2.0; ix <= w / 2.0; ix += step) {

          x1 = fxt(ix, iy, t);
          y1 = fyt(ix, iy, t);
          z1 = fzt(ix, iy, t);

          x2 = fxt(ix + step, iy, t);
          y2 = fyt(ix + step, iy, t);
          z2 = fzt(ix + step, iy, t);

          if (ix + step <= w * 0.5) dline3d(x1, y1, z1, x2, y2, z2);


          x2 = fxt(ix, iy + step, t);
          y2 = fyt(ix, iy + step, t);
          z2 = fzt(ix, iy + step, t);

          if (iy + step <= h * 0.5) dline3d(x1, y1, z1, x2, y2, z2);

        }
      }

      return
    }


    function surfaceNormal(fxt, fyt, fzt, u, v, t) {

      let eps = 0.001;

      // ∂S/∂u via central differences
      let dux = (fxt(u + eps, v, t) - fxt(u - eps, v, t)) / (2 * eps);
      let duy = (fyt(u + eps, v, t) - fyt(u - eps, v, t)) / (2 * eps);
      let duz = (fzt(u + eps, v, t) - fzt(u - eps, v, t)) / (2 * eps);

      // ∂S/∂v via central differences
      let dvx = (fxt(u, v + eps, t) - fxt(u, v - eps, t)) / (2 * eps);
      let dvy = (fyt(u, v + eps, t) - fyt(u, v - eps, t)) / (2 * eps);
      let dvz = (fzt(u, v + eps, t) - fzt(u, v - eps, t)) / (2 * eps);

      // N = ∂S/∂u × ∂S/∂v
      let nx = duy * dvz - duz * dvy;
      let ny = duz * dvx - dux * dvz;
      let nz = dux * dvy - duy * dvx;

      let len = Math.sqrt(nx * nx + ny * ny + nz * nz) + 1e-12;

      return [nx / len, ny / len, nz / len];
    }




    // Mode 0: Normal direction mapped to colormap
    //   dot(normal, lightDir) simulates diffuse lighting
    function colorFromNormal(nx, ny, nz) {
      // Light direction (upper-right-front, normalized)
      let lx = 0.57, ly = 0.57, lz = 0.57;
      let dot = nx * lx + ny * ly + nz * lz;
      // Remap [-1, 1] → [0, 1]
      return dot * 0.5 + 0.5;
    }

    // Mode 1: Height (z-value) mapped to colormap
    function colorFromHeight(z, zmin, zmax) {
      return (z - zmin) / (zmax - zmin + 1e-12);
    }

    // Mode 2: Parameter position (UV gradient)
    function colorFromUV(u, v, umin, umax, vmin, vmax) {
      let tu = (u - umin) / (umax - umin);
      let tv = (v - vmin) / (vmax - vmin);
      return tu * 0.7 + tv * 0.3; // blend both
    }

    // Mode 3: Gaussian curvature approximation (advanced)
    //   High curvature = bright, flat = dark
    function colorFromCurvature(fxt, fyt, fzt, u, v, t) {
      let eps = 0.01;
      let n0 = surfaceNormal(fxt, fyt, fzt, u, v, t);
      let nu = surfaceNormal(fxt, fyt, fzt, u + eps, v, t);
      let nv = surfaceNormal(fxt, fyt, fzt, u, v + eps, t);
      // How fast the normal changes ≈ curvature
      let dnux = nu[0] - n0[0], dnuy = nu[1] - n0[1], dnuz = nu[2] - n0[2];
      let dnvx = nv[0] - n0[0], dnvy = nv[1] - n0[1], dnvz = nv[2] - n0[2];
      let ku = Math.sqrt(dnux * dnux + dnuy * dnuy + dnuz * dnuz) / eps;
      let kv = Math.sqrt(dnvx * dnvx + dnvy * dnvy + dnvz * dnvz) / eps;
      let k = (ku + kv) * 0.5;
      // Compress with tanh for nice [0,1] mapping
      return Math.tanh(k * 0.5);
    }

    function dgridplane3dcolor(w, h, step, fxt, fyt, fzt, t, cmapFn, colorMode) {

      // Default to viridis + normal coloring
      cmapFn = cmapFn || viridis;
      colorMode = colorMode || 0;

      let umin = -w / 2.0, umax = w / 2.0;
      let vmin = -h / 2.0, vmax = h / 2.0;

      // Precompute z range for height mode
      let zmin = Infinity, zmax = -Infinity;
      if (colorMode === 1) {
        for (let iv = vmin; iv <= vmax; iv += step * 3) {
          for (let iu = umin; iu <= umax; iu += step * 3) {
            let z = fzt(iu, iv, t);
            if (z < zmin) zmin = z;
            if (z > zmax) zmax = z;
          }
        }
      }

      for (let iy = vmin; iy <= vmax; iy += step) {
        for (let ix = umin; ix <= umax; ix += step) {

          let x1 = fxt(ix, iy, t);
          let y1 = fyt(ix, iy, t);
          let z1 = fzt(ix, iy, t);

          // Compute color scalar
          let scalar = 0.0;
          if (colorMode === 0) {
            let n = surfaceNormal(fxt, fyt, fzt, ix, iy, t);
            scalar = colorFromNormal(n[0], n[1], n[2]);
          } else if (colorMode === 1) {
            scalar = colorFromHeight(z1, zmin, zmax);
          } else if (colorMode === 2) {
            scalar = colorFromUV(ix, iy, umin, umax, vmin, vmax);
          } else if (colorMode === 3) {
            scalar = colorFromCurvature(fxt, fyt, fzt, ix, iy, t);
          }

          //scalar = map(ix, umin, umax, 0,1);
          let col = cmapFn(scalar);
          stroke(col[0], col[1], col[2]);

          // Horizontal edge
          let x2 = fxt(ix + step, iy, t);
          let y2 = fyt(ix + step, iy, t);
          let z2 = fzt(ix + step, iy, t);
          if (ix + step <= umax) dline3d(x1, y1, z1, x2, y2, z2);

          // Vertical edge
          x2 = fxt(ix, iy + step, t);
          y2 = fyt(ix, iy + step, t);
          z2 = fzt(ix, iy + step, t);
          if (iy + step <= vmax) dline3d(x1, y1, z1, x2, y2, z2);
        }
      }
    }


    function dgaxis(lx, ly) {

      let x = 0;
      let y = 0;
      //let lx = 32;
      //let ly = 32;

      let thicknessLine = 0.008;
      let thicknessPoint = 0.02;
      let colorNeg = '#E4EBF4';
      let col = '#FFFFFF';
      let colx = '#C03548';
      let coly = '#4EAB30';

      //X
      stroke(col); //'#C03548'
      strokeWeight(thicknessPoint);
      //point(x+lx/2.0,0.0);

      strokeWeight(thicknessLine);
      line(x - lx / 2.0, y, x + lx / 2.0, y);


      stroke(colorNeg);
      strokeWeight(thicknessPoint);
      //point(x-lx/2.0,0.0);
      //point(x+lx/2.0,0.0);


      //Y
      stroke(col); //'#4EAB30'
      strokeWeight(thicknessPoint);
      //point(0.0,y+ly/2.0);

      strokeWeight(thicknessLine);
      line(x, y - ly / 2.0, x, y + ly / 2.0);

      stroke(colorNeg);
      strokeWeight(thicknessPoint);
      //point(0.0,y-ly/2.0);
      //point(0.0,y+ly/2.0);

      // [0,0]
      //point(0,0);

      return;
    }

    function daxis(x, y, lx, ly) {

      let thicknessLine = 0.02;
      let thicknessPoint = 0.1;
      let colorNeg = '#E4EBF4';

      //X
      stroke('#C03548');
      strokeWeight(thicknessPoint);
      point(x + lx / 2.0, 0.0);

      strokeWeight(thicknessLine);
      line(x - lx / 2.0, y, x + lx / 2.0, y);

      stroke(colorNeg);
      strokeWeight(thicknessPoint);
      point(x - lx / 2.0, 0.0);


      //Y
      stroke('#4EAB30');
      strokeWeight(thicknessPoint);
      point(0.0, y + ly / 2.0);

      strokeWeight(thicknessLine);
      line(x, y - ly / 2.0, x, y + ly / 2.0);

      stroke(colorNeg);
      strokeWeight(thicknessPoint);
      point(0.0, y - ly / 2.0);

      // [0,0]
      //point(0,0);

      return;
    }

    function dgrid(x, y, col, row, w, h, lineColor, lineThickness) {

      stroke(lineColor);
      strokeWeight(lineThickness);

      //vertical lines
      for (let ic = -w / 2.0; ic <= w / 2.0; ic += w / col) {
        line(x + ic, y + -h / 2.0, x + ic, y + h / 2.0);
      }

      //horizontal lines
      for (let ir = -h / 2.0; ir <= h / 2.0; ir += h / row) {
        line(-w / 2.0 + x, ir + y, w / 2.0 + x, ir + y);
      }

      return;
    }

    function dtext(s, x, y) {

      push();
      scale(1.0, -1.0);
      text(s, x, -y);
      pop();

      return;
    }

    function dimage(img, x, y, s) {

      push();
      scale(s, -s);
      image(img, x - img.width / 2.0, y - img.height / 2.0);
      pop();
      return;
    }

    function dq2beziercolor(p0, p1, p2, t) {

      let x0 = p0[0];
      let y0 = p0[1];
      let z0 = p0[2];

      let x1 = p1[0];
      let y1 = p1[1];
      let z1 = p1[2];

      let x2 = p2[0];
      let y2 = p2[1];
      let z2 = p2[2];

      let q2b = (t) => [(1 - t) * (1 - t) * x0 + 2 * (1 - t) * t * x1 + t * t * x2, (1 - t) * (1 - t) * y0 + 2 * (1 - t) * t * y1 + t * t * y2, (1 - t) * (1 - t) * z0 + 2 * (1 - t) * t * z1 + t * t * z2];
      let q0 = [0.0, 0.0, 0.0];
      q0 = q2b(t);

      return q0;
    }

    function dpoint(p) {
      point(p[0], p[1]);
      return;
    }

    function drect(p, a, b) {
      rect(p[0], p[1], a, b);
      return;
    }

    function dline(p0, p1) {
      line(p0[0], p0[1], p1[0], p1[1]);
      return;
    }

    function dverticalline(p, l) {

      line(p[0], p[1], p[0], p[1] + l);

      return;
    }

    function dhorizontalline(p, l) {

      line(p[0], p[1], p[0] + l, p[1]);

      return;
    }

    function dellipse(p, r1, r2) {

      ellipse(p[0], p[1], 2.0 * r1, 2.0 * r2);

    }

      let t = (wmin - w1) / (w2 - w1);

      // Interpolate ALL clip-space components (linear in clip-space!)
      let cx = lerpnum(c1[0], c2[0], t);
      let cy = lerpnum(c1[1], c2[1], t);
      let cz = lerpnum(c1[2], c2[2], t);
      let cw = lerpnum(c1[3], c2[3], t); // ≈ wmin

      // Now draw from the valid point to the clipped intersection
      if (w1 >= wmin) {
        line(c1[0] / w1, c1[1] / w1, cx / cw, cy / cw);
      } else {
        line(cx / cw, cy / cw, c2[0] / w2, c2[1] / w2);
      }
    }


    function dline3d(x1, y1, z1, x2, y2, z2) {

      let p1 = vperspective(x1, y1, z1, 0, 0, 0, 0, 0, 0);
      let p2 = vperspective(x2, y2, z2, 0, 0, 0, 0, 0, 0);

      //line(p1[0]/p1[3], p1[1]/p1[3],
      //     p2[0]/p2[3], p2[1]/p2[3]);

      clipAndDrawLine3d(x1, y1, z1, x2, y2, z2);

      return;
    }

    function dcube(w, h, d, xc, yc, zc, rx, ry, rz) {

      let hw = w * 0.5;
      let hh = h * 0.5;
      let hd = d * 0.5;

      // 8 vertices (local space)
      let verts = [
        [-hw, -hh, -hd],
        [hw, -hh, -hd],
        [hw, hh, -hd],
        [-hw, hh, -hd],
        [-hw, -hh, hd],
        [hw, -hh, hd],
        [hw, hh, hd],
        [-hw, hh, hd]
      ];

      // 12 edges (index pairs)
      let edges = [
        [0, 1], [1, 2], [2, 3], [3, 0],  // back face
        [4, 5], [5, 6], [6, 7], [7, 4],  // front face
        [0, 4], [1, 5], [2, 6], [3, 7]   // connecting edges
      ];

      // Rotation ZYX
      let ca = cos(rx), sa = sin(rx);
      let cb = cos(ry), sb = sin(ry);
      let cc = cos(rz), sc = sin(rz);

      let r00 = cb * cc;
      let r01 = sa * sb * cc - ca * sc;
      let r02 = ca * sb * cc + sa * sc;
      let r10 = cb * sc;
      let r11 = sa * sb * sc + ca * cc;
      let r12 = ca * sb * sc - sa * cc;
      let r20 = -sb;
      let r21 = sa * cb;
      let r22 = ca * cb;

      // Transform vertices
      let tv = [];
      for (let i = 0; i < 8; i++) {
        let x = verts[i][0];
        let y = verts[i][1];
        let z = verts[i][2];
        tv.push([
          r00 * x + r01 * y + r02 * z + xc,
          r10 * x + r11 * y + r12 * z + yc,
          r20 * x + r21 * y + r22 * z + zc
        ]);
      }

      // Draw 12 edges
      for (let i = 0; i < edges.length; i++) {
        let a = tv[edges[i][0]];
        let b = tv[edges[i][1]];
        dline3d(a[0], a[1], a[2], b[0], b[1], b[2]);
      }
    }

    function dgrid3d(x, y, z, a, b, c, col, row, w, h, lineColor, lineThickness) {

      stroke(lineColor);
      strokeWeight(lineThickness);

      let p1 = [];
      let p2 = [];

      //vertical lines
      for (let ic = -w / 2.0; ic <= w / 2.0 + w / col * 0; ic += w / col) {

        p1 = rotation3d(x + ic, y - h / 2.0, z, a, b, c);
        p2 = rotation3d(x + ic, y + h / 2.0, z, a, b, c);

        //dline3d(x+ic,y+-h/2.0,z, x+ic,y+h/2.0,z);

        dline3d(p1[0], p1[1], p1[2], p2[0], p2[1], p2[2]);
      }

      //horizontal lines
      for (let ir = -h / 2.0; ir <= h / 2.0 + h / row * 0; ir += h / row) {

        p1 = rotation3d(-w / 2.0 + x, ir + y, z, a, b, c);
        p2 = rotation3d(w / 2.0 + x, ir + y, z, a, b, c);

        //dline3d (-w/2.0 + x , ir + y ,z, w/2.0 + x , ir + y,z);

        dline3d(p1[0], p1[1], p1[2], p2[0], p2[1], p2[2]);
      }

      p1 = [];
      p2 = [];

      return;
    }

    function dtriangle3d(p1, p2, p3) {

      let p1_ = getpoint3d(p1[0], p1[1], p1[2]);

    function dvec3d(tail, head, arrowLength, arrowWidth) {

      let dx = head[0] - tail[0];
      let dy = head[1] - tail[1];
      let dz = head[2] - tail[2];
      let len = Math.sqrt(dx * dx + dy * dy + dz * dz);
      if (len < 1e-8) return;

      // Unit direction
      let ux = dx / len;
      let uy = dy / len;
      let uz = dz / len;

      // Base point of arrowhead (where the line ends)
      let bx = head[0] - arrowLength * ux;
      let by = head[1] - arrowLength * uy;
      let bz = head[2] - arrowLength * uz;

      // Build perpendicular vectors (same idea as 2D [-dy,dx])
      // Pick an arbitrary vector NOT parallel to u
      let ax, ay, az;
      if (Math.abs(ux) < 0.9) {
        ax = 1; ay = 0; az = 0;
      } else {
        ax = 0; ay = 1; az = 0;
      }

      // First perpendicular: cross(u, arbitrary)
      let n1x = uy * az - uz * ay;
      let n1y = uz * ax - ux * az;
      let n1z = ux * ay - uy * ax;
      let n1l = Math.sqrt(n1x * n1x + n1y * n1y + n1z * n1z);
      n1x /= n1l; n1y /= n1l; n1z /= n1l;

      // Second perpendicular: cross(u, n1)
      let n2x = uy * n1z - uz * n1y;
      let n2y = uz * n1x - ux * n1z;
      let n2z = ux * n1y - uy * n1x;

      // Draw line from tail to base of arrow
      dline3d(tail[0], tail[1], tail[2], bx, by, bz);

      // Arrowhead: 3 points forming a triangle
      // Tip = head
      // Two base points offset along n1 and n2
      let hw = arrowWidth * 0.5;

      // Equilateral-ish triangle: 3 vertices on the base circle
      // at 0°, 120°, 240° around the direction axis
      // But for a flat arrow (like your 2D version), just 2 base + tip:
      let p1 = head;
      let p2 = [bx + hw * n1x, by + hw * n1y, bz + hw * n1z];
      let p3 = [bx - hw * n1x, by - hw * n1y, bz - hw * n1z];

      //dtriangle3d(p1, p2, p3);

      // Second triangle perpendicular to the first (cross shape)
      // gives the arrowhead volume from any viewing angle
      let p4_ = [bx + hw * n2x, by + hw * n2y, bz + hw * n2z];
      let p5_ = [bx - hw * n2x, by - hw * n2y, bz - hw * n2z];

      dtriangle3d(p1, p4_, p5_);
    }
