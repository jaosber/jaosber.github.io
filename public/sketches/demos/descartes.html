// Class that manages an array of circles
class CirclesArray {
  constructor() {
    this.circles = [];
  }
  
  // Inserts a circle into the array
  insert(icircle) {
    // It is assumed that 'circle' already contains the 'ikey' property
    this.circles.push(icircle);
  }
  
  // Searches for and returns a circle by its key
  search(ikey) {
    return this.circles.find(c => c.ikey === ikey) || null;
  }
  
  // Removes the circle that matches the key from the array and returns it
  remove(ikey) {
    const index = this.circles.findIndex(c => c.ikey === ikey);
    if (index !== -1) {
      return this.circles.splice(index, 1)[0];
    }
    return null;
  }
}

function generatekey(position,radius) {
  
  const precision = 9;
  // Convert each component of the position to a string with 4 decimal places.
  const formattedPosition = position.map(coor => Number(coor).toFixed(precision));
  // Convert the radius to a string with 4 decimal places.
  const formattedRadius = Number(radius).toFixed(precision);
  
  // Concatenate the position and radius with an underscore as a separator.
  return [...formattedPosition, formattedRadius].join('_');
}

class CNode {
  constructor(data) {
    //data: {position: [x, y], radius: r, ikey: x+y+r}
    this.data = data;
    this.left = null;
    this.right = null;
  }
}

// Clase para el árbol binario de esferas.
class BinaryTree {
  
  constructor() {
    this.root = null;
  }
  
  // Inserta una esfera en el árbol.
  // Se usa sphere.position[0] (la coordenada x) como clave de ordenación.
  insert(ncircle) {
    const newNode = new CNode(ncircle);
    if (this.root === null) {
      this.root = newNode;
    } else {
      this._insertNode(this.root, newNode);
    }
  }
  
  _insertNode(node, newNode) {
    // Si la componente x de la esfera a insertar es menor, se va a la rama izquierda;
    // de lo contrario, a la derecha.
    if (newNode.data.position[0] < node.data.position[0]) {
      if (node.left === null) {
        node.left = newNode;
      } else {
        this._insertNode(node.left, newNode);
      }
    } else {
      if (node.right === null) {
        node.right = newNode;
      } else {
        this._insertNode(node.right, newNode);
      }
    }
  }
  
  // Busca un nodo cuyo valor clave (componente x de la posición) coincida con dkey.
  // Retorna el nodo encontrado o null si no se encuentra.
  search(dkey) {
    return this._searchNode(this.root, dkey);
  }
  
  _searchNode(node, dkey) {
    
    if (node === null) {
      return null;
    }
    
    if (dkey === node.data.ikey){
      return node;
    }
    
    if (dkey < node.data.position[0]){
      return this._searchNode(node.left, dkey);
    }else{
      return this._searchNode(node.right, dkey);
    }
    
  }
  
  // Elimina del árbol el nodo cuya clave (componente x de la posición) es dkey.
  remove(dkey) {
    this.root = this._removeNode(this.root, dkey);
  }
  
  _removeNode(node, dkey) {
    if (node === null) {
      return null;
    }
    
    if (dkey < node.data.position[0]) {
      node.left = this._removeNode(node.left, dkey);
      return node;
    } else if (dkey > node.data.position[0]) {
      node.right = this._removeNode(node.right, dkey);
      return node;
    } else {
      // Nodo encontrado:
      // Caso 1: sin hijos.
      if (node.left === null && node.right === null) {
        return null;
      }
      // Caso 2: solo hijo derecho.
      if (node.left === null) {
        return node.right;
      }
      // Caso 3: solo hijo izquierdo.
      if (node.right === null) {
        return node.left;
      }
      // Caso 4: dos hijos.
      // Se busca el nodo con la clave mínima en el subárbol derecho.
      const aux = this._findMinNode(node.right);
      // Se reemplaza el contenido del nodo actual con el del auxiliar.
      node.data = aux.data;
      // Se elimina el nodo duplicado en el subárbol derecho.
      node.right = this._removeNode(node.right, aux.data.position[0]);
      return node;
    }
  }
  
  //Retorna el nodo con la clave mínima del subárbol (usando la componente x).
  _findMinNode(node) {
    while (node.left !== null) {
      node = node.left;
    }
    return node;
  }
  
}

function circleorientation(pm, rm, p1, r1, p2, r2) {
  // Helper function to get the angle of a point p relative to pm, normalized in [0, 2π)
  function getAngle(p) {
    let ang = Math.atan2(p[1] - pm[1], p[0] - pm[0]);
    return (ang < 0) ? ang + 2 * Math.PI : ang;
  }
  
  // Calculate the angles of the centers of c1 and c2 relative to pm
  let ang1 = getAngle(p1);
  let ang2 = getAngle(p2);
  
  // Function that determines if the angle is within the "right" interval
  function isRight(angulo) {
    return (angulo < Math.PI / 2 || angulo > 3 * Math.PI / 2);
  }
  
  let p1Right = isRight(ang1);
  let p2Right = isRight(ang2);
  
  let c_left, c_right;
  
  // Assume that one of the circles is on the right and the other on the left
  if (p1Right && !p2Right) {
    c_right = [p1, r1];
    c_left  = [p2, r2];
  } else if (!p1Right && p2Right) {
    c_right = [p2, r2];
    c_left  = [p1, r1];
  } else {
    // If both are in the same half-plane, they are ordered based on the angle value (smaller = right)
    if (ang1 < ang2) {
      c_right = [p1, r1];
      c_left  = [p2, r2];
    } else {
      c_right = [p2, r2];
      c_left  = [p1, r1];
    }
  }
  
  return [c_left, c_right];
}

function tanradius(r1,r2,r3){  
  
  let k4neg = (1/r1) + (1/r2) + (1/r3) - 2*sqrt( (1/r1)*(1/r2) + (1/r1)*(1/r3) + (1/r2)*(1/r3) );
  let k4pos = (1/r1) + (1/r2) + (1/r3) + 2*sqrt( (1/r1)*(1/r2) + (1/r1)*(1/r3) + (1/r2)*(1/r3) );
  
  let r4neg = 1/k4neg;
  let r4pos = 1/k4pos;
  
  return [isNaN(r4neg) ? 0:r4neg, isNaN(r4pos) ? 0:r4pos];
}

    let z4np = zpos(z1, z2, z3, k1, k2, k3, k4p, -1);
    let z4nn = zpos(z1, z2, z3, k1, k2, k3, k4n, -1);
    
    return [ [z4pp[0],z4pp[1],r4p], 
             [z4pn[0],z4pn[1],r4n],

           ];

function heuristicspos(z1,z2,z3, r1,r2,r3){
  
  let arr_r4 = tanradius(r1,r2,r3);
  let r4n = arr_r4[0];
  let r4p = arr_r4[1];
    
  let k1 = 1/r1;
  let k2 = 1/r2;
  let k3 = 1/r3;
  let k4n = 1/r4n;
  let k4p = 1/r4p;
    
  let z4pp = zpos(z1, z2, z3, k1, k2, k3, k4p,  1);
  let z4pn = zpos(z1, z2, z3, k1, k2, k3, k4n,  1);
  let z4np = zpos(z1, z2, z3, k1, k2, k3, k4p, -1);
  let z4nn = zpos(z1, z2, z3, k1, k2, k3, k4n, -1);
  
  let x3 = z3[0];
  let y3 = z3[1];
  
  let d1p = znorm(zsub(z1,z4pp));
  let d2p = znorm(zsub(z2,z4pp));
  let d3p = znorm(zsub(z3,z4pp));
  
  let d1n = znorm(zsub(z1,z4nn));
  let d2n = znorm(zsub(z2,z4nn));
  let d3n = znorm(zsub(z3,z4nn));
  
  let imin = -0.0000005;
  let imax =  0.0000005;
  
  let cond1 = (isrange((r3+r4p)-d3p,imin,imax) == 1) || (isrange((r1+r4p)-d1p,imin,imax) == 1) || (isrange((r2+r4p)-d2p,imin,imax) == 1);
  let cond2 = (isrange((r3+r4n)-d3n,imin,imax) == 1) || (isrange((r1+r4n)-d1n,imin,imax) == 1) || (isrange((r2+r4n)-d2n,imin,imax) == 1);
  
    
  if(cond1 || cond2){
    
    return[
          [z4pp[0],z4pp[1],r4p], 
          [z4nn[0],z4nn[1],r4n]
        ];
    
  }
  
  return[
          [z4pn[0],z4pn[1],r4n],
          [z4np[0],z4np[1],r4p]
        ];
}

function zpos(z1, z2, z3, k1, k2, k3, k4, signvalue=1) {
  
  //z4 = ( z1*k1 + z2*k2 + z3*k3 + 2*sqrt(k1*k2*z1*z2 + k1*k3*z1*z3 + k2*k3*z2*z3) )/ k4
  
  // Primera parte: k1*z1 + k2*z2 + k3*z3
  let term1 = zmult(z1, k1);
  let term2 = zmult(z2, k2);
  let term3 = zmult(z3, k3);
  let sum = zadd(zadd(term1, term2), term3);
  
  //Segunda parte: sqrt( k1*k2*z1*z2 + k1*k3*z1*z3 + k2*k3*z2*z3 )
  let prod1 = zmult(zmult(z1, z2), k1 * k2);
  let prod2 = zmult(zmult(z1, z3), k1 * k3);
  let prod3 = zmult(zmult(z2, z3), k2 * k3);
  let inside = zadd(zadd(prod1, prod2), prod3);
  let sqrt_inside = zsqrt(inside);
  let secondPart = zmult(signvalue*2,sqrt_inside);
  
  //Suma ambas partes
  let z4 = zadd(sum, secondPart);
  
  //División escalar k4
  return [z4[0] / k4, z4[1] / k4];
}

function zadd(z1,z2){
  return [z1[0] + z2[0] , z1[1] + z2[1]];
}

function zsub(z2,z1){
  return [z2[0] - z1[0] , z2[1] - z1[1]];
}

function zmult(z1,z2){
  
  if (typeof z1 === 'number') {
    return [z1*z2[0], z1*z2[1]];
  }else if (typeof z2 === 'number') {
    return [z2*z1[0], z2*z1[1]];
  }
  
  let a = z1[0];
  let b = z1[1];
  let c = z2[0];
  let d = z2[1];
  
  return [a*c-b*d,a*d+b*c];
}

function zdiv(z1, z2) {
  let denom = z2[0] * z2[0] + z2[1] * z2[1];
  return [
    (z1[0] * z2[0] + z1[1] * z2[1]) / denom,
    (z1[1] * z2[0] - z1[0] * z2[1]) / denom
  ];
}

function zconj(z) {
  return [z[0], -z[1]];
}

function zabs(z) {
  return Math.sqrt(z[0] * z[0] + z[1] * z[1]);
}

function znorm(z) {
  return Math.sqrt(z[0] * z[0] + z[1] * z[1]);
}

function zarg(z) {
  return Math.atan2(z[1], z[0]);
}

function zsqrt(z) {
  let r = zabs(z);
  let theta = zarg(z);
  let sqrt_r = Math.sqrt(r);
  return [
    sqrt_r * Math.cos(theta / 2),
    sqrt_r * Math.sin(theta / 2)
  ];
}

function zexp(z) {
  let exp_a = Math.exp(z[0]);
  return [ exp_a * Math.cos(z[1]), exp_a * Math.sin(z[1])];
}

function zlog(z) {
  
  return [ Math.log(zabs(z)), zarg(z)];
}

function zsin(z) {
  return [ Math.sin(z[0]) * Math.cosh(z[1]), Math.cos(z[0]) * Math.sinh(z[1])];
}

function zcos(z) {
  return [ Math.cos(z[0]) * Math.cosh(z[1]), -Math.sin(z[0]) * Math.sinh(z[1]) ];
}

  let n = 0.0;
  for(let i = 0 ; i < v.length ; i++){

  let l = sqrt(n);

function arctheta(x1,y1,x2,y2){
    let dx = x2 - x1;
    let dy = y2 - y1;
    
    if(dx == 0){return sgn(dy)*PI/2.0; }
    
    if (0 < dx && 0 < dy){ return acos (  dx/(sqrt(dx*dx + dy*dy))  ); }
    if (dx <= 0 && 0 < dy ){ return acos (  dx/(sqrt(dx*dx + dy*dy))  ); }
    if (dx < 0  && dy <= 0){ return PI + atan (dy/dx); }
    if (0<= dx  && dy < 0 ){ return 2*PI + atan (dy/dx); }
    return 0;
}

function arcphi(x0,y0,z0, x1,y1,z1){
    h0 = Math.sqrt( (x1-x0)*(x1-x0) + (y1-y0)*(y1-y0) + (z1-z0)*(z1-z0));
    h1 = Math.sqrt( (x1-x0)*(x1-x0) + (y1-y0)*(y1-y0) );
    dz = z1 - z0
    return h1 > 0  ? (dz >= 0 ? Math.acos(h1/h0) : -Math.acos(h1/h0)): sgn(dz)*Math.PI/2.0;
}

function mod(a,b){
  return  a-b*Math.floor(a/b);
}

function sinh(x){  
  return (exp(x)-exp(-x))/2.0;
}

function cosh(x){  
  return (exp(x)+exp(-x))/2.0;
}

function coth(x){  
  return cosh(x)/sinh(x);
}

function sech(x){  
  return 1/cosh(x);
}

function csch(x){  
  return 1/sinh(x);
}

function tanh(x){
  
  return (exp(x)-exp(-x))/(exp(x)+exp(-x));
}

function tnh(x){
  
  let a = 8.0;
  
  return x <= -a ? -1.0 :  a <= x ? 1.0 : tanh(x);
}

function sigmoid(x){
  
  return 1.0/(1.0+exp(-x));
}

function sgm(x){
  
  let a = 8.0;
  
  return x <= -a ? 0.0 :  a <= x ? 1.0 : sigmoid(2.0*x);
}

function sgn(x){
	return ( x < 0 ? -1 : (x > 0 ? 1 : 0) );
}

function tsn(x,min,max){
  
  var a = abs (min) + abs(max);
  var p = 2.0*a;
  var y = min; 
  //r*sin(x/p)
  //r*(2.0*abs( 2*( x/p - floor(x/p  + 0.75) + 0.25 )) - 1.0) ;  
  return  a*( abs( 2*(x/p - floor(x/p  + 0.5)))) + y;  
}

function tgn(x,a,b,c){
  
  return c*Math.min( mod(-a*x,b), mod(a*x,b) );
}

function twa(x){
  
  return tsn(x,0.0,1.0);
}


function frustumprojection(x,y,z){
  
  //https://www.math3d.org/8mK4VUfXF
  
  let t = TIME;
  
  let theta = 0.0;
  let phi = 0.0;
  
  let a = 0.2*t; 
  let b = 0.5*t;
  let c = 0.0;
  
  let r = 1.0; //width/height
  
  let Tx = 0.0;
  let Ty = 0.0;
  let Tz = 0.0;
  
  let u = (30.0)*(PI/180.0);
  let n = -1.25;
  let f = 100.0;
  
  let _x = x*cos(b)*cos(c)/(r*tan(0.5*u)) - y*cos(b)*sin(c)/(r*tan(0.5*u)) - z*sin(b)/(r*tan(0.5*u)) + Tx;
  
  let _y = -z*cos(b)*sin(a)/tan(0.5*u) - (cos(c)*sin(a)*sin(b) - cos(a)*sin(c))*x/tan(0.5*u) + (sin(a)*sin(b)*sin(c) + cos(a)*cos(c))*y/tan(0.5*u) + Ty;
  
  let _z = (f + n)*z*cos(a)*cos(b)/(f - n) + (cos(a)*cos(c)*sin(b) + sin(a)*sin(c))*(f + n)*x/(f - n) - (cos(a)*sin(b)*sin(c) - cos(c)*sin(a))*(f + n)*y/(f - n) - 2*f*n/(f - n) + Tz;
  
  let _w = z*cos(a)*cos(b) + (cos(a)*cos(c)*sin(b) + sin(a)*sin(c))*x - (cos(a)*sin(b)*sin(c) - cos(c)*sin(a))*y;
  
  
  return [_x,_y,_z,_w];
}
