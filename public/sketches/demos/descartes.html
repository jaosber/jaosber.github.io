<!doctype html>
<html>
  <head>
    <meta charset="UTF-8" />
    <style>
      * {
        margin: 0;
        padding: 0;
      }
      html,
      body {
        overflow: hidden;
      }
      canvas {
        display: block;
      }
    </style>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.9.4/p5.min.js"></script>
  </head>
  <body>
    <script>
      let TIME = 0.0;
      let canvas;
      let font;
      let scaleX = 100,
        scaleY = 100;
      let mx = 0.0,
        my = 0.0;
      let pmx = 0.0,
        pmy = 0.0;

      let colorBackground = "#0E1012";
      let colorHUD = "#E5DCDC";
      let dpi = 2;

      let wcamera = [0.0, 0.0];
      let wzoom = 1.0;
      let wscaleoffset = [0, 0];

      function preload() {
        //font = loadFont('assets/fonts/Inconsolata-Regular.ttf');
        return;
      }

      function setup() {
        //canvas = createCanvas(1080,720);
        canvas = createCanvas(windowWidth, windowHeight);
        frameRate(30);
        smooth(8.0);
        pixelDensity(dpi);
        //textFont(font);
        textSize(32.0);
        textAlign(LEFT);
        rectMode(CENTER);
        prefconfig();
        initconfig();
        return;
      }

      function windowResized() {
        canvas = resizeCanvas(windowWidth, windowHeight);
      }

      function draw() {
        drawloop(TIME);
        return;
      }

      // ============================================================
      // Apollonian Gasket - Descartes Circle Theorem
      // ============================================================

      // Circle representation: { k: curvature, cx: center_x, cy: center_y }
      // Convention: k > 0 for normal circles, k < 0 for the enclosing circle
      // Curvature k = 1/r (with sign)

      function makeCircle(k, cx, cy) {
        return { k: k, cx: cx, cy: cy };
      }

      // Tangency error: sum of absolute differences between actual distances
      // and expected tangency distances for a candidate circle against 3 others.
      // For two circles with signed curvatures ki, kj:
      //   expected distance = |1/ki + 1/kj|
      // This works for both external tangency (same sign k) and internal tangency (opposite signs).
      function tangencyError(c1, c2, c3, k4, cx4, cy4) {
        let err = 0;
        let parents = [c1, c2, c3];
        for (let i = 0; i < 3; i++) {
          let c = parents[i];
          let dx = c.cx - cx4;
          let dy = c.cy - cy4;
          let dist = Math.sqrt(dx * dx + dy * dy);
          let expected = Math.abs(1.0 / c.k + 1.0 / k4);
          err += Math.abs(dist - expected);
        }
        return err;
      }

      // Find BOTH Descartes solutions for three mutually tangent circles.
      // Uses the full quadratic formula (with sqrt). Only needed once at the start.
      function descartesBoth(c1, c2, c3) {
        let k1 = c1.k,
          k2 = c2.k,
          k3 = c3.k;

        // Curvature discriminant
        let disc = k1 * k2 + k2 * k3 + k1 * k3;
        if (disc < 0) {
          disc = 0;
        } // guard for floating point
        let sqrtDisc = Math.sqrt(disc);

        // Two possible curvatures
        let k4a = k1 + k2 + k3 + 2.0 * sqrtDisc;
        let k4b = k1 + k2 + k3 - 2.0 * sqrtDisc;

        // Complex weighted centers: w_i = k_i * z_i (where z is treated as complex)
        let w1 = [k1 * c1.cx, k1 * c1.cy];
        let w2 = [k2 * c2.cx, k2 * c2.cy];
        let w3 = [k3 * c3.cx, k3 * c3.cy];
        let wsum = [w1[0] + w2[0] + w3[0], w1[1] + w2[1] + w3[1]];

        // Complex discriminant for position:
        // wd = k1*k2*z1*z2 + k2*k3*z2*z3 + k1*k3*z1*z3
        let z1 = [c1.cx, c1.cy];
        let z2 = [c2.cx, c2.cy];
        let z3 = [c3.cx, c3.cy];

        let wd = zadd(
          zadd(zmult(zmult(z1, z2), k1 * k2), zmult(zmult(z2, z3), k2 * k3)),
          zmult(zmult(z1, z3), k1 * k3),
        );

        let sqrtWd = zsqrt(wd);
        let twoSqrtWd = [2.0 * sqrtWd[0], 2.0 * sqrtWd[1]];

        // Two candidate weighted positions (from ± sqrt)
        let wPlus = [wsum[0] + twoSqrtWd[0], wsum[1] + twoSqrtWd[1]];
        let wMinus = [wsum[0] - twoSqrtWd[0], wsum[1] - twoSqrtWd[1]];

        let results = [];
        let curvatures = [k4a, k4b];

        for (let ci = 0; ci < curvatures.length; ci++) {
          let k4 = curvatures[ci];
          if (Math.abs(k4) < 1e-12) {
            continue;
          }

          // Try both sqrt signs, pick the one with lowest tangency error
          let bestCircle = null;
          let bestErr = Infinity;

          let candidates = [wPlus, wMinus];
          for (let wi = 0; wi < candidates.length; wi++) {
            let w4 = candidates[wi];
            let cx4 = w4[0] / k4;
            let cy4 = w4[1] / k4;
            let err = tangencyError(c1, c2, c3, k4, cx4, cy4);
            if (err < bestErr) {
              bestErr = err;
              bestCircle = makeCircle(k4, cx4, cy4);
            }
          }

          // Accept if tangency error is reasonable
          if (bestCircle && bestErr < 0.1) {
            results.push(bestCircle);
          }
        }

        return results;
      }

      // Iterative Descartes: given 3 circles and the KNOWN 4th tangent circle (cOld),
      // find the OTHER circle tangent to the same triple.
      // Formula: k_new = 2*(k1+k2+k3) - k_old
      //          w_new = 2*(w1+w2+w3) - w_old
      // No sqrt, no sign ambiguity. This is the core of the flicker fix.
      function descartesIterate(c1, c2, c3, cOld) {
        let kNew = 2.0 * (c1.k + c2.k + c3.k) - cOld.k;

        if (Math.abs(kNew) < 1e-12) {
          return null;
        }

        let w1x = c1.k * c1.cx,
          w1y = c1.k * c1.cy;
        let w2x = c2.k * c2.cx,
          w2y = c2.k * c2.cy;
        let w3x = c3.k * c3.cx,
          w3y = c3.k * c3.cy;
        let wOx = cOld.k * cOld.cx,
          wOy = cOld.k * cOld.cy;

        let wNx = 2.0 * (w1x + w2x + w3x) - wOx;
        let wNy = 2.0 * (w1y + w2y + w3y) - wOy;

        return makeCircle(kNew, wNx / kNew, wNy / kNew);
      }

      // Recursive gasket filler.
      // c1, c2, c3: the three circles bounding the current gap
      // cOld: the known 4th tangent circle (on the other side of the gap)
      // depth: recursion depth limit
      // minRadius: stop drawing circles smaller than this
      // arr: CirclesArray for deduplication
      function fillGasket(c1, c2, c3, cOld, depth, minRadius, arr) {
        if (depth <= 0) {
          return;
        }

        let cNew = descartesIterate(c1, c2, c3, cOld);
        if (!cNew) {
          return;
        }

        let r = Math.abs(1.0 / cNew.k);
        if (r < minRadius || isNaN(r) || !isFinite(r)) {
          return;
        }

        let key = generatekey([cNew.cx, cNew.cy], r);
        if (arr.search(key) != null) {
          return;
        }

        arr.insert({ position: [cNew.cx, cNew.cy], radius: r, ikey: key });
        dcircle([cNew.cx, cNew.cy], r);

        // Each new circle creates 3 sub-gaps with pairs of the parent circles.
        // For each sub-gap, the "old" circle is the parent NOT in the triple.
        fillGasket(c1, c2, cNew, c3, depth - 1, minRadius, arr);
        fillGasket(c1, c3, cNew, c2, depth - 1, minRadius, arr);
        fillGasket(c2, c3, cNew, c1, depth - 1, minRadius, arr);
      }

      // ============================================================
      // Main draw loop
      // ============================================================

      function drawloop(dtime) {
        push();

        let t = dtime * 1.0;
        background(colorBackground);
        updateconfig();
        daxis(64.0, 64.0);
        noiseSeed(2910);

        // --- Animated parameters ---
        let a1 = 2.8 * cos(t * 1.5);
        let a2 = 3.1 + a1 * 0.5 + sin(t * 1.2);

        let r1 = 2.5;
        let r2 = 0.5 * cos(t * 2.8) + 1.1;

        // r3 computed so circle 3 is tangent to both circle 1 (internally) and circle 2 (externally)
        let denom = (r2 - r1) * cos(a2 - a1) + r1 + r2;
        if (Math.abs(denom) < 1e-10) {
          pop();
          hud();
          return; // degenerate config, skip frame
        }
        let r3 = (-r1 * (r1 - r2) * (cos(a2 - a1) - 1.0)) / denom;

        if (r3 <= 0.001 || r3 >= r1) {
          pop();
          hud();
          return; // invalid config, skip frame
        }

        // Circle centers
        let cx2 = (r1 - r2) * cos(a1);
        let cy2 = (r1 - r2) * sin(a1);
        let cx3 = (r1 - r3) * cos(a2);
        let cy3 = (r1 - r3) * sin(a2);

        // Define circles with signed curvatures
        // Outer circle: negative curvature (enclosing)
        let cOuter = makeCircle(-1.0 / r1, 0, 0);
        let cA = makeCircle(1.0 / r2, cx2, cy2);
        let cB = makeCircle(1.0 / r3, cx3, cy3);

        // --- Draw the 3 initial circles ---
        noFill();
        stroke(255);
        strokeWeight(0.012);
        dcircle([0, 0], r1);
        dcircle([cx2, cy2], r2);
        dcircle([cx3, cy3], r3);

        // --- Find the first two filling circles (full Descartes) ---
        let initSolutions = descartesBoth(cOuter, cA, cB);

        let minRadius = 0.008;
        let maxDepth = 7;
        let marr = new CirclesArray();

        // Register initial circles to avoid duplicates
        marr.insert({
          position: [0, 0],
          radius: r1,
          ikey: generatekey([0, 0], r1),
        });
        marr.insert({
          position: [cx2, cy2],
          radius: r2,
          ikey: generatekey([cx2, cy2], r2),
        });
        marr.insert({
          position: [cx3, cy3],
          radius: r3,
          ikey: generatekey([cx3, cy3], r3),
        });

        for (let si = 0; si < initSolutions.length; si++) {
          let sol = initSolutions[si];
          if (!sol) {
            continue;
          }

          let r = Math.abs(1.0 / sol.k);
          if (r < minRadius || isNaN(r) || !isFinite(r)) {
            continue;
          }

          let key = generatekey([sol.cx, sol.cy], r);
          if (marr.search(key) != null) {
            continue;
          }
          marr.insert({ position: [sol.cx, sol.cy], radius: r, ikey: key });
          dcircle([sol.cx, sol.cy], r);

          // Each initial solution creates 3 sub-gaps.
          // For gap (cOuter, cA, sol): the old 4th circle is cB
          // For gap (cOuter, cB, sol): the old 4th circle is cA
          // For gap (cA, cB, sol):     the old 4th circle is cOuter
          fillGasket(cOuter, cA, sol, cB, maxDepth, minRadius, marr);
          fillGasket(cOuter, cB, sol, cA, maxDepth, minRadius, marr);
          fillGasket(cA, cB, sol, cOuter, maxDepth, minRadius, marr);
        }

        marr.clear();

        wcamera = [0, 0];
        wzoom = 2.0;
        wscaleoffset = [0, 0];

        pop();
        hud();

        return;
      }

      // ============================================================
      // CirclesArray - deduplication structure
      // ============================================================

      class CirclesArray {
        constructor() {
          this.circles = [];
        }
        insert(icircle) {
          this.circles.push(icircle);
        }
        search(ikey) {
          return this.circles.find((c) => c.ikey === ikey) || null;
        }
        remove(ikey) {
          const index = this.circles.findIndex((c) => c.ikey === ikey);
          if (index !== -1) {
            return this.circles.splice(index, 1)[0];
          }
          return null;
        }

        clear(){
          this.circles = [];
        }
      }

      function generatekey(position, radius) {
        const precision = 6; // reduced from 9 for better dedup tolerance
        const formattedPosition = position.map((coor) =>
          Number(coor).toFixed(precision),
        );
        const formattedRadius = Number(Math.abs(radius)).toFixed(precision);
        return [...formattedPosition, formattedRadius].join("_");
      }

      // ============================================================
      // Complex number arithmetic (z = [re, im])
      // ============================================================

      function zadd(z1, z2) {
        return [z1[0] + z2[0], z1[1] + z2[1]];
      }

      function zsub(z1, z2) {
        return [z1[0] - z1[0], z1[1] - z2[1]]; // NOTE: keeping original signature
      }

      function zmult(z1, z2) {
        if (typeof z1 === "number") {
          return [z1 * z2[0], z1 * z2[1]];
        } else if (typeof z2 === "number") {
          return [z2 * z1[0], z2 * z1[1]];
        }
        let a = z1[0],
          b = z1[1],
          c = z2[0],
          d = z2[1];
        return [a * c - b * d, a * d + b * c];
      }

      function zdiv(z1, z2) {
        let denom = z2[0] * z2[0] + z2[1] * z2[1];
        return [
          (z1[0] * z2[0] + z1[1] * z2[1]) / denom,
          (z1[1] * z2[0] - z1[0] * z2[1]) / denom,
        ];
      }

      function zconj(z) {
        return [z[0], -z[1]];
      }

      function zabs(z) {
        return Math.sqrt(z[0] * z[0] + z[1] * z[1]);
      }

      function znorm(z) {
        return Math.sqrt(z[0] * z[0] + z[1] * z[1]);
      }

      function zarg(z) {
        return Math.atan2(z[1], z[0]);
      }

      function zsqrt(z) {
        let r = zabs(z);
        let theta = zarg(z);
        let sqrt_r = Math.sqrt(r);
        return [sqrt_r * Math.cos(theta / 2.0), sqrt_r * Math.sin(theta / 2.0)];
      }

      function zexp(z) {
        let exp_a = Math.exp(z[0]);
        return [exp_a * Math.cos(z[1]), exp_a * Math.sin(z[1])];
      }

      function zlog(z) {
        return [Math.log(zabs(z)), zarg(z)];
      }

      function zsin(z) {
        return [
          Math.sin(z[0]) * Math.cosh(z[1]),
          Math.cos(z[0]) * Math.sinh(z[1]),
        ];
      }

      function zcos(z) {
        return [
          Math.cos(z[0]) * Math.cosh(z[1]),
          -Math.sin(z[0]) * Math.sinh(z[1]),
        ];
      }

      // ============================================================
      // Config / HUD
      // ============================================================

      function prefconfig() {
        translate(width / 2.0, height / 2.0);
        applyMatrix(
          scaleX * (1.0 / wzoom) + wscaleoffset[0],
          0.0,
          0.0,
          -scaleY * (1.0 / wzoom) + wscaleoffset[1],
          0.0,
          0.0,
        );
        translate(-wcamera[0], -wcamera[1]);
        return;
      }

      function initconfig() {
        return;
      }

      function updateconfig() {
        mx = map(mouseX, 0, width, -width / (2 * scaleX), width / (2 * scaleX));
        my = -map(
          mouseY,
          0,
          height,
          -height / (2 * scaleY),
          height / (2 * scaleY),
        );
        pmx = map(
          pmouseX,
          0,
          width,
          -width / (2 * scaleX),
          width / (2 * scaleX),
        );
        pmy = -map(
          pmouseY,
          0,
          height,
          -height / (2 * scaleY),
          height / (2 * scaleY),
        );
        prefconfig();
        TIME = millis() / 1000.0;
        return;
      }

      function hud() {
        textAlign(LEFT);
        textSize(16.0);
        fill(colorHUD);
        noStroke();
        text(nfc(frameRate(), 2) + " fps", width - 80, 20.0);
        text("time: " + nfc(millis() / 1000.0, 2.0) + "s", 10, 20.0);
        return;
      }

      // ============================================================
      // Drawing utilities
      // ============================================================

      function daxis(lx, ly) {
        let thicknessLine = 0.008;
        let col = "#FFFFFF";
        stroke(col);
        strokeWeight(thicknessLine);
        line(-lx / 2.0, 0, lx / 2.0, 0);
        line(0, -ly / 2.0, 0, ly / 2.0);
        return;
      }

      function dgrid(x, y, col, row, w, h, lineColor, lineThickness) {
        stroke(lineColor);
        strokeWeight(lineThickness);
        for (let ic = -w / 2.0; ic <= w / 2.0; ic += w / col) {
          line(x + ic, y - h / 2.0, x + ic, y + h / 2.0);
        }
        for (let ir = -h / 2.0; ir <= h / 2.0; ir += h / row) {
          line(-w / 2.0 + x, ir + y, w / 2.0 + x, ir + y);
        }
        return;
      }

      function dpoint(p) {
        point(p[0], p[1]);
      }
      function dline(p0, p1) {
        line(p0[0], p0[1], p1[0], p1[1]);
      }
      function dellipse(p, r1, r2) {
        ellipse(p[0], p[1], 2.0 * r1, 2.0 * r2);
      }

      function dcircle(p, r) {
        ellipse(p[0], p[1], 2.0 * Math.abs(r), 2.0 * Math.abs(r));
        return;
      }

      function dtext(s, x, y, a, b) {
        push();
        scale(a, b);
        text(s, x, -y);
        pop();
        return;
      }

      function stext(s, x, y, k) {
        push();
        scale(k, -k);
        text(s, x, -y);
        pop();
        return;
      }

      function dvec(tail, head, arrowsize, offset) {
        let l = arrowsize;
        let o = offset;
        let b = 0.5 * (2.0 / 1.732050808) * l;
        let u = vnormalize(vsub(head, tail));
        let nu = [-u[1], u[0]];
        let np = vline(head, u, -l);
        let p1 = head;
        let p2 = vline(np, nu, b);
        let p3 = vline(head, u, -l + o);
        let p4 = vline(np, nu, -b);
        line(tail[0], tail[1], p3[0], p3[1]);
        push();
        noStroke();
        beginShape();
        vertex(p1[0], p1[1]);
        vertex(p2[0], p2[1]);
        vertex(p3[0], p3[1]);
        vertex(p4[0], p4[1]);
        endShape(CLOSE);
        pop();
        return;
      }

      // ============================================================
      // Vector math utilities
      // ============================================================

      function vmult(a, b) {
        if (typeof a === "number" && Array.isArray(b)) {
          return b.map((x) => a * x);
        }
        if (typeof b === "number" && Array.isArray(a)) {
          return a.map((x) => b * x);
        }
        if (typeof a === "number" && typeof b === "number") {
          return a * b;
        }
        if (Array.isArray(a) && Array.isArray(b) && a.length === b.length) {
          return a.map((x, i) => x * b[i]);
        }
        return [];
      }

      function vdiv(a, b) {
        if (typeof a === "number" && Array.isArray(b)) {
          return b.map((x) => x / a);
        }
        if (typeof b === "number" && Array.isArray(a)) {
          return a.map((x) => x / b);
        }
        if (typeof a === "number" && typeof b === "number") {
          return a / b;
        }
        if (Array.isArray(a) && Array.isArray(b) && a.length === b.length) {
          return a.map((x, i) => x / b[i]);
        }
        return [];
      }

      function vadd(a, b) {
        if (typeof a === "number" && Array.isArray(b)) {
          return b.map((x) => a + x);
        }
        if (typeof b === "number" && Array.isArray(a)) {
          return a.map((x) => b + x);
        }
        if (typeof a === "number" && typeof b === "number") {
          return a + b;
        }
        if (Array.isArray(a) && Array.isArray(b) && a.length === b.length) {
          return a.map((x, i) => x + b[i]);
        }
        return [];
      }

      function vsub(a, b) {
        if (typeof a === "number" && Array.isArray(b)) {
          return b.map((x) => x - a);
        }
        if (typeof b === "number" && Array.isArray(a)) {
          return a.map((x) => x - b);
        }
        if (typeof a === "number" && typeof b === "number") {
          return a - b;
        }
        if (Array.isArray(a) && Array.isArray(b) && a.length === b.length) {
          return a.map((x, i) => x - b[i]);
        }
        return [];
      }

      function vnormalize(v) {
        let n = 0.0;
        for (let i = 0; i < v.length; i++) {
          n += v[i] * v[i];
        }
        let l = sqrt(n);
        return vmult(1.0 / l, v);
      }

      function vdot(a, b) {
        let product = 0.0;
        for (let i = 0; i < a.length; i++) {
          product += a[i] * b[i];
        }
        return product;
      }

      function vcross(a, b) {
        return [
          a[1] * b[2] - a[2] * b[1],
          a[2] * b[0] - a[0] * b[2],
          a[0] * b[1] - a[1] * b[0],
        ];
      }

      function vdist(a, b) {
        let n = 0.0;
        for (let i = 0; i < a.length; i++) {
          n += (a[i] - b[i]) * (a[i] - b[i]);
        }
        return sqrt(n);
      }

      function vnorm(v) {
        let n = 0.0;
        for (let i = 0; i < v.length; i++) {
          n += v[i] * v[i];
        }
        return sqrt(n);
      }

      function vlength(v) {
        return vnorm(v);
      }

      function vline(p, u, t) {
        return vadd(p, vmult(u, t));
      }

      function vpline(p0, p1, t) {
        let u = vnormalize(vsub(p1, p0));
        return vadd(p0, vmult(u, t));
      }

      function dvline(p, u, tmin, tmax) {
        let di = 0.032;
        for (let i = tmin; i <= tmax; i += di) {
          let p1 = vadd(p, vmult(u, i));
          let p2 = vadd(p, vmult(u, i + di));
          line(p1[0], p1[1], p2[0], p2[1]);
        }
        return;
      }

      function vmod(v, n) {
        return v.map((x) => x % n);
      }
      function vabs(a) {
        return a.map(Math.abs);
      }
      function vmax(a, b) {
        if (Array.isArray(a) && Array.isArray(b)) {
          return a.map((x, i) => Math.max(x, b[i]));
        }
        if (Array.isArray(a)) {
          return a.map((x) => Math.max(x, b));
        }
        if (Array.isArray(b)) {
          return b.map((x) => Math.max(a, x));
        }
        return Math.max(a, b);
      }

      function lerpnum(a, b, t) {
        return (1 - t) * a + t * b;
      }
      function lerpvec2(p0, p1, t) {
        return [(1 - t) * p0[0] + t * p1[0], (1 - t) * p0[1] + t * p1[1]];
      }
      function lerpvec3(p0, p1, t) {
        return [
          (1 - t) * p0[0] + t * p1[0],
          (1 - t) * p0[1] + t * p1[1],
          (1 - t) * p0[2] + t * p1[2],
        ];
      }

      // ============================================================
      // Scalar math utilities
      // ============================================================

      function isequal(a, b, epsilon = 0.0001) {
        return Math.abs(a - b) < epsilon;
      }
      function step(a, x) {
        return x < a ? 0.0 : 1.0;
      }
      function clamp(x, minVal, maxVal) {
        return Math.min(Math.max(x, minVal), maxVal);
      }
      function frac(x) {
        return x - floor(x);
      }
      function smoothstep(edge0, edge1, x) {
        let t = clamp((x - edge0) / (edge1 - edge0), 0.0, 1.0);
        return t * t * (3.0 - 2.0 * t);
      }
      function mod(a, b) {
        return a - b * Math.floor(a / b);
      }
      function sgn(x) {
        return x < 0 ? -1 : x > 0 ? 1 : 0;
      }
      function sinh(x) {
        return (exp(x) - exp(-x)) / 2.0;
      }
      function cosh(x) {
        return (exp(x) + exp(-x)) / 2.0;
      }
      function tanh(x) {
        return (exp(x) - exp(-x)) / (exp(x) + exp(-x));
      }
      function coth(x) {
        return cosh(x) / sinh(x);
      }
      function sech(x) {
        return 1 / cosh(x);
      }
      function csch(x) {
        return 1 / sinh(x);
      }
      function sigmoid(x) {
        return 1.0 / (1.0 + exp(-x));
      }

      function tnh(x) {
        let a = 8.0;
        return x <= -a ? -1.0 : a <= x ? 1.0 : tanh(x);
      }

        let a = 8.0;
        return x <= -a ? 0.0 : a <= x ? 1.0 : sigmoid(2.0 * x);
      }

      function tsn(x, min, max) {
        var a = abs(min) + abs(max);
        var p = 2.0 * a;
        var y = min;
        return a * abs(2 * (x / p - floor(x / p + 0.5))) + y;
      }

      function tgn(x, a, b, c) {
        return c * Math.min(mod(-a * x, b), mod(a * x, b));
      }
      function twa(x) {

        let dx = x2 - x1;
        let dy = y2 - y1;
        if (dx == 0) {
          return (sgn(dy) * PI) / 2.0;
        }
        if (0 < dx && 0 < dy) {
          return acos(dx / sqrt(dx * dx + dy * dy));
        }
        if (dx <= 0 && 0 < dy) {
          return acos(dx / sqrt(dx * dx + dy * dy));
        }
        if (dx < 0 && dy <= 0) {
          return PI + atan(dy / dx);
        }
        if (0 <= dx && dy < 0) {
          return 2 * PI + atan(dy / dx);
        }
        return 0;
      }
